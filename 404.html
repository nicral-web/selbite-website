<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selbite Inc</title>
    <script>
        // GitHub Pages doesn't support clean URLs natively
        // This redirects /privacy-policy to /privacy-policy.html etc.
        const path = window.location.pathname;
        const pages = ['/privacy-policy', '/terms-of-service'];
        if (pages.includes(path)) {
            window.location.replace(path + '.html');
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #1a1a2e; background: #fafafa; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
        .container { padding: 40px; }
        h2 { font-size: 28px; margin-bottom: 12px; }
        p { color: #666; margin-bottom: 20px; }
        a { color: #0f3460; text-decoration: none; font-weight: 600; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Page Not Found</h2>
        <p>The page you're looking for doesn't exist.</p>
        <a href="/">Back to Home</a>
    </div>
</body>
</html>
